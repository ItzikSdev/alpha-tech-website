<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlphaCar - צור קשר</title>
  <meta name="description" content="צור קשר עם AlphaCar">
  <meta name="theme-color" content="#0D1117">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0D1117;
      --bg-card: #161B22;
      --border: #21262D;
      --text: #F0F6FC;
      --text-secondary: #8B949E;
      --accent: #22D3EE;
      --accent-dark: #0891B2;
      --gradient: linear-gradient(135deg, #22D3EE 0%, #0891B2 100%);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.6;
    }
    html[dir="ltr"] body { font-family: 'Inter', sans-serif; }

    nav {
      position: fixed; top: 0; width: 100%; z-index: 100;
      padding: 16px 0;
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 12px; text-decoration: none;
    }
    .nav-logo img { width: 40px; height: 40px; border-radius: 10px; }
    .nav-logo span { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: 0.5px; }
    .nav-links {
      display: flex; gap: 32px; list-style: none; align-items: center;
    }
    .nav-links a {
      color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 15px; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--accent); text-decoration: none; font-weight: 600; font-size: 15px; transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 0.8; }
    .back-btn svg { width: 20px; height: 20px; }

    .lang-switcher { position: relative; display: flex; align-items: center; }
    .lang-btn {
      background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.2);
      color: var(--accent); padding: 6px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: background 0.2s; font-family: inherit;
    }
    .lang-btn:hover { background: rgba(34,211,238,0.2); }
    .lang-btn svg { width: 16px; height: 16px; fill: currentColor; }
    .lang-dropdown {
      position: absolute; top: 100%; margin-top: 8px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; min-width: 140px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all 0.2s; z-index: 200;
    }
    html[dir="rtl"] .lang-dropdown { right: 0; }
    html[dir="ltr"] .lang-dropdown { left: 0; }
    .lang-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .lang-option {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      cursor: pointer; font-size: 14px; color: var(--text); transition: background 0.15s;
      border: none; background: none; width: 100%; font-family: inherit; text-align: inherit;
    }
    .lang-option:hover { background: rgba(34,211,238,0.1); }
    .lang-option.active { color: var(--accent); }
    .lang-option .flag { font-size: 18px; }

    .page-content {
      max-width: 700px; margin: 0 auto;
      padding: 120px 24px 80px;
    }
    .page-content h2 {
      font-size: 28px; font-weight: 800; margin-bottom: 24px; color: var(--accent);
    }
    .page-content p, .page-content li {
      color: var(--text-secondary); font-size: 15px; line-height: 1.8; margin-bottom: 12px;
    }
    .page-content ul { padding-inline-start: 20px; }
    .page-content h3 {
      font-size: 18px; font-weight: 700; margin: 24px 0 12px; color: var(--text);
    }
    .contact-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px;
    }
    .contact-item {
      background: rgba(34,211,238,0.05); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; text-align: center;
    }
    .contact-item .icon { font-size: 28px; margin-bottom: 8px; }
    .contact-item h4 { font-weight: 700; margin-bottom: 4px; }
    .contact-item p { margin: 0; }
    .contact-item a { color: var(--accent); text-decoration: none; }

    footer {
      padding: 48px 24px; border-top: 1px solid var(--border); text-align: center;
    }
    .footer-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-logo { display: flex; align-items: center; gap: 10px; }
    .footer-logo img { width: 32px; border-radius: 8px; }
    .footer-logo span { font-weight: 700; font-size: 18px; }
    footer p { color: var(--text-secondary); font-size: 14px; }
    .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
    .footer-links a {
      color: var(--text-secondary); text-decoration: none; font-size: 14px; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }
    .footer-links a.active { color: var(--accent); font-weight: 600; }

    @media (max-width: 900px) {
      .nav-links { display: none; }
      .footer-inner { flex-direction: column; gap: 16px; }
      .page-content { padding: 100px 16px 60px; }
      .contact-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .nav-inner { padding: 0 16px; }
      .nav-logo span { font-size: 18px; }
      .nav-logo img { width: 34px; height: 34px; }
      .page-content h2 { font-size: 22px; }
      .page-content h3 { font-size: 16px; }
      .page-content p, .page-content li { font-size: 14px; }
      .contact-item { padding: 14px; }
      .contact-item .icon { font-size: 24px; }
      footer { padding: 24px 12px; }
      .footer-links { gap: 16px; justify-content: center; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="images/logo.png" alt="AlphaCar">
        <span>AlphaCar</span>
      </a>
      <ul class="nav-links">
        <li>
          <a href="index.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            <span data-i18n="nav.backHome">חזרה לדף הראשי</span>
          </a>
        </li>
        <li>
          <div class="lang-switcher">
            <button class="lang-btn" onclick="toggleLangDropdown()">
              <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
              <span id="currentLangLabel">עברית</span>
            </button>
            <div class="lang-dropdown" id="langDropdown">
              <button class="lang-option active" onclick="setLanguage('he')">
                <span class="flag">🇮🇱</span> עברית
              </button>
              <button class="lang-option" onclick="setLanguage('en')">
                <span class="flag">🇺🇸</span> English
              </button>
              <button class="lang-option" onclick="setLanguage('ru')">
                <span class="flag">🇷🇺</span> Русский
              </button>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </nav>

  <div class="page-content" id="pageContent"></div>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="images/logo.png" alt="AlphaCar">
        <span>AlphaCar</span>
      </div>
      <p data-i18n="footer.rights">&copy; 2026 AlphaCar. כל הזכויות שמורות.</p>
      <div class="footer-links">
        <a href="terms.html" data-i18n="footer.terms">תנאי שימוש</a>
        <a href="privacy.html" data-i18n="footer.privacy">פרטיות</a>
        <a href="contact.html" class="active" data-i18n="footer.contact">צור קשר</a>
      </div>
    </div>
  </footer>

  <script>
    const pageData = {
      he: `<h2>צור קשר</h2>
        <p>יש לך שאלות? נשמח לעזור! צוות AlphaCar כאן בשבילך.</p>
        <div class="contact-grid">
          <div class="contact-item">
            <div class="icon">📧</div>
            <h4>אימייל</h4>
            <p><a href="mailto:support@alpha-tech.live">support@alpha-tech.live</a></p>
          </div>
          <div class="contact-item">
            <div class="icon">💬</div>
            <h4>צ'אט באפליקציה</h4>
            <p>זמין 24/7 דרך האפליקציה</p>
          </div>
          <div class="contact-item">
            <div class="icon">📱</div>
            <h4>רשתות חברתיות</h4>
            <p>עקבו אחרינו בפייסבוק ובאינסטגרם</p>
          </div>
          <div class="contact-item">
            <div class="icon">📍</div>
            <h4>מיקום</h4>
            <p>ישראל</p>
          </div>
        </div>`,
      en: `<h2>Contact Us</h2>
        <p>Have questions? We're happy to help! The AlphaCar team is here for you.</p>
        <div class="contact-grid">
          <div class="contact-item">
            <div class="icon">📧</div>
            <h4>Email</h4>
            <p><a href="mailto:support@alpha-tech.live">support@alpha-tech.live</a></p>
          </div>
          <div class="contact-item">
            <div class="icon">💬</div>
            <h4>In-App Chat</h4>
            <p>Available 24/7 through the app</p>
          </div>
          <div class="contact-item">
            <div class="icon">📱</div>
            <h4>Social Media</h4>
            <p>Follow us on Facebook and Instagram</p>
          </div>
          <div class="contact-item">
            <div class="icon">📍</div>
            <h4>Location</h4>
            <p>Israel</p>
          </div>
        </div>`,
      ru: `<h2>Связаться с нами</h2>
        <p>Есть вопросы? Мы рады помочь! Команда AlphaCar здесь для вас.</p>
        <div class="contact-grid">
          <div class="contact-item">
            <div class="icon">📧</div>
            <h4>Email</h4>
            <p><a href="mailto:support@alpha-tech.live">support@alpha-tech.live</a></p>
          </div>
          <div class="contact-item">
            <div class="icon">💬</div>
            <h4>Чат в приложении</h4>
            <p>Доступен 24/7 через приложение</p>
          </div>
          <div class="contact-item">
            <div class="icon">📱</div>
            <h4>Соцсети</h4>
            <p>Следите за нами в Facebook и Instagram</p>
          </div>
          <div class="contact-item">
            <div class="icon">📍</div>
            <h4>Расположение</h4>
            <p>Израиль</p>
          </div>
        </div>`,
    };

    const translations = {
      he: { 'nav.backHome': 'חזרה לדף הראשי', 'footer.rights': '© 2026 AlphaCar. כל הזכויות שמורות.', 'footer.terms': 'תנאי שימוש', 'footer.privacy': 'פרטיות', 'footer.contact': 'צור קשר' },
      en: { 'nav.backHome': 'Back to Home', 'footer.rights': '© 2026 AlphaCar. All rights reserved.', 'footer.terms': 'Terms of Service', 'footer.privacy': 'Privacy', 'footer.contact': 'Contact Us' },
      ru: { 'nav.backHome': 'На главную', 'footer.rights': '© 2026 AlphaCar. Все права защищены.', 'footer.terms': 'Условия использования', 'footer.privacy': 'Конфиденциальность', 'footer.contact': 'Связаться с нами' },
    };

    const titles = { he: 'AlphaCar - צור קשר', en: 'AlphaCar - Contact Us', ru: 'AlphaCar - Связаться с нами' };
    const langLabels = { he: 'עברית', en: 'English', ru: 'Русский' };
    let currentLang = localStorage.getItem('alphacar-lang') || 'he';

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('alphacar-lang', lang);
      const html = document.documentElement;
      html.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
      html.setAttribute('lang', lang);
      document.title = titles[lang];
      document.getElementById('pageContent').innerHTML = pageData[lang];
      document.getElementById('currentLangLabel').textContent = langLabels[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang]?.[key]) el.textContent = translations[lang][key];
      });
      document.querySelectorAll('.lang-option').forEach(opt => {
        opt.classList.toggle('active', opt.getAttribute('onclick')?.includes(lang));
      });
      document.querySelectorAll('.lang-dropdown').forEach(d => d.classList.remove('open'));
    }

    function toggleLangDropdown() {
      document.getElementById('langDropdown').classList.toggle('open');
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.lang-switcher')) {
        document.querySelectorAll('.lang-dropdown').forEach(d => d.classList.remove('open'));
      }
    });

    setLanguage(currentLang);
  </script>
</body>
</html>
